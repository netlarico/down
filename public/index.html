<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <title>Audio Downloader - Extrae audio de videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="url"],
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="url"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-download:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-download:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-download:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            color: #555;
        }

        @media (max-width: 500px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Audio Downloader</h1>
            <p>Descarga audio de videos en segundos</p>
        </div>

        <div class="info-box">
            ℹ️ Compatible con Facebook, YouTube, Instagram, TikTok y muchas plataformas más
        </div>

        <form id="downloadForm">
            <div class="form-group">
                <label for="videoUrl">URL del Video</label>
                <input type="url" id="videoUrl" name="videoUrl" placeholder="https://www.facebook.com/share/v/1KT82FERZ3/" required />
            </div>

            <div class="form-group">
                <label for="title">Título / Nombre</label>
                <input type="text" id="title" name="title" placeholder="Ej: Mi canción favorita" />
            </div>

            <div class="form-group">
                <label for="artist">Autor / Grupo</label>
                <input type="text" id="artist" name="artist" placeholder="Ej: Artista o Banda" />
            </div>

            <div class="button-group">
                <button type="submit" class="btn-download" id="downloadBtn">
                    ⬇️ Descargar Audio
                </button>
                <button type="reset" class="btn-clear">
                    🔄 Limpiar
                </button>
            </div>
        </form>

        <div id="status" class="status"></div>
    </div>

    <script>
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('videoUrl');
        const titleInput = document.getElementById('title');
        const artistInput = document.getElementById('artist');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const url = urlInput.value.trim();
            if (!url) {
                showStatus('Por favor ingresa una URL válida', 'error');
                return;
            }

            try {
                downloadBtn.disabled = true;
                showStatus('<span class="spinner"></span>Descargando audio...', 'loading');

                // Construir la URL con parámetros
                const params = new URLSearchParams();
                params.append('url', url);
                if (titleInput.value.trim()) {
                    params.append('title', titleInput.value.trim());
                }
                if (artistInput.value.trim()) {
                    params.append('artist', artistInput.value.trim());
                }

                // Realizar la descarga
                const response = await fetch(`/extract?${params.toString()}`);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Error al descargar el archivo');
                }

                // Obtener el nombre del archivo
                const contentDisposition = response.headers.get('content-disposition');
                let filename = 'audio.m4a';

                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename="?([^"]+)"?/);
                    if (filenameMatch) {
                        filename = filenameMatch[1];
                    }
                }

                // Descargar el blob
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(downloadUrl);
                document.body.removeChild(a);

                showStatus('✅ Descarga completada exitosamente', 'success');
                form.reset();
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                downloadBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = `status show ${type}`;
        }

        // Limpiar mensaje de estado cuando el usuario escribe
        urlInput.addEventListener('input', () => {
            statusDiv.className = 'status';
        });
    </script>
</body>

</html>
